name: PR Preview


on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr-${{ github.event.number }}
          path: |
            .
            !.git
          retention-days: 7

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## Preview ready\n\nDownload the site preview from the [workflow artifacts](${runUrl}).\n\nOr to preview locally:\n\`\`\`bash\ngh run download ${context.runId} -n site-preview-pr-${context.issue.number}\npython3 -m http.server 8000\n\`\`\``;

            // Check for existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('## Preview ready'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
