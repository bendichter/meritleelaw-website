<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meritlee Law</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=GFS+Didot&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b1525;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .logo {
    display: inline-flex;
    flex-direction: column;
    align-items: stretch;
  }
  .meritlee {
    font-size: 76px;
    font-weight: 400;
    color: #f0ede6;
    letter-spacing: 0.08em;
    line-height: 1;
    font-family: 'Bodoni Moda', serif;
    transform: scaleX(0.8);
    transform-origin: left;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    margin-top: 6px;
  }
  .law {
    font-size: 26px;
    font-weight: 400;
    color: #5a8a6a;
    letter-spacing: 0.55em;
    font-family: 'Bodoni Moda', serif;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .line {
    width: 205px;
    height: 1px;
    background: linear-gradient(to right, #c9a96e, #e8c98a);
    margin-left: 20px;
  }
</style>
</head>
<body>
  <div class="logo">
    <div class="meritlee">MERITLEE</div>
    <div class="bottom-row">
      <span class="law">LAW</span>
      <div class="line"></div>
    </div>
  </div>
</body>
</html>
